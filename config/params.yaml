# StatArb Alpha: Cointegrated Pairs Trading with Kalman Filter Parameters
pairs:
  - ['SOL', 'ETH']
  - ['BTC', 'ETH']
  - ['AVAX', 'SOL']
  - ['LINK', 'ETH']

lookback_period: 180  # days
z_score_threshold: 2.0
stop_loss_z: 4.0
max_half_life: 15     # days
rebalance_freq: 24    # hours
transaction_cost: 0.001
slippage_model: 0.0005

# Kalman Filter parameters
initial_state_mean: 0.0
initial_state_covariance: 1.0
transition_covariance: 1e-5  # Q
observation_covariance: 1e-1   # R

# Risk Management
max_position_size: 0.1  # % of portfolio
daily_drawdown_limit: 0.02
total_drawdown_limit: 0.10
risk_free_rate: 0.05
